<!DOCTYPE html>
<html lang="en">

<head>
 
  <title>Web-Page</title>
  <link rel="stylesheet" href="style.css">
  
</head>

<body>
  <header id="greeting">Hello</header>

  <div class="boxes">
    <div class="box" id="redBox">Red</div>
    <div class="box" id="blueBox">Blue</div>
    <div class="box" id="greenBox">Green</div>
    <div class="box" id="yellowBox">Yellow</div>
  </div>

  <div class="input-section">
    <input type="text" id="nameInput" placeholder="Enter your name">
    <button id="greetButton">Greet Me</button>
  </div>

  <script src="script.js"></script>

</body>

</html>
